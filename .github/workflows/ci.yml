name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  identity-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/identity-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/identity-service/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --ci

  queue-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/queue-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/queue-service/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --ci
